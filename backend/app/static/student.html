<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Студент | Queue Helper</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <h1>QUEUE HELPER</h1>
    <h2>Вход / Регистрация</h2>
    <form id="addForm">
        <input type="email" id="studentName" placeholder="Email" required>
        <input type="password" id="studentPassword" placeholder="Пароль">
        <input type="text" id="studentGroup" placeholder="Группа" required>
        <button type="submit" class="btn" id="submitBtn">Подписаться</button>
    </form>
    <div id="message" style="display:none; text-align:center; margin-top:10px;"></div>

    <h2>Текущая очередь</h2>
    <div id="queueStatus">Ваше место: </div>
    <ul id="queueList"></ul>
</div>
<script src="/static/script.js"></script>
</body>
</html>
